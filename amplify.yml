version: 1
backend:
  phases:
    build:
      commands:
        - npm install
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - rm -f .env.production
        - env | grep -E '^(APP_AWS_REGION|APP_AWS_ACCESS_KEY_ID|APP_AWS_SECRET_ACCESS_KEY|SESSION_SECRET|SITE_URL|EMAIL_PROVIDER|EMAIL_FROM|ADMIN_EMAIL|RESEND_API_KEY|NEXT_PUBLIC_GOOGLE_MAPS_API_KEY|DDB_TABLE_USERS|DDB_TABLE_CUSTOMER_PROFILES|DDB_TABLE_QUOTES|DDB_TABLE_BOOKINGS|DDB_TABLE_QUOTE_AUDITS|DDB_TABLE_DRIVER_PROFILES|DDB_TABLE_DRIVER_DOCUMENTS|DDB_TABLE_DRIVER_REMINDER_LOGS)=' >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
